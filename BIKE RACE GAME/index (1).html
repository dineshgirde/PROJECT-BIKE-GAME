<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bike Race</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #ff4400;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 0 20px #ff4400aa;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 1rem;
      color: #ffaa00;
      letter-spacing: 2px;
    }
    canvas {
      border: 2px solid #ff4400;
      border-radius: 4px;
      box-shadow: 0 0 40px #ff440066;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #overlay h2 {
      font-size: 2.5rem;
      color: #ff4400;
      text-shadow: 0 0 30px #ff4400;
      letter-spacing: 4px;
    }
    #overlay p { color: #ccc; font-size: 1rem; letter-spacing: 2px; }
    #startBtn {
      padding: 14px 40px;
      background: #ff4400;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px #ff440088;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px #ff4400cc;
    }
    #controls {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>🏍️ Bike Race</h1>
<div id="hud">
  <span>SCORE: <b id="scoreDisplay">0</b></span>
  <span>BEST: <b id="bestDisplay">0</b></span>
  <span>SPEED: <b id="speedDisplay">1x</b></span>
</div>

<div style="position:relative;">
  <canvas id="gameCanvas" width="480" height="600"></canvas>
  <div id="overlay">
    <h2>BIKE RACE</h2>
    <p>Dodge traffic. Survive. Win.</p>
    <button id="startBtn" onclick="startGame()">START RACE</button>
  </div>
</div>

<div id="controls">← → ARROW KEYS &nbsp;|&nbsp; A D KEYS &nbsp;|&nbsp; MOBILE: TAP SIDES</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const speedDisplay = document.getElementById('speedDisplay');

const W = canvas.width, H = canvas.height;
const ROAD_LEFT = 60, ROAD_RIGHT = W - 60;
const ROAD_W = ROAD_RIGHT - ROAD_LEFT;
const LANE_W = ROAD_W / 3;
const LANES = [
  ROAD_LEFT + LANE_W * 0.5,
  ROAD_LEFT + LANE_W * 1.5,
  ROAD_LEFT + LANE_W * 2.5,
];

let player, enemies, roadLines, score, best, gameSpeed, running, animId, keys, spawnTimer;

function initGame() {
  player = { x: LANES[1], y: H - 130, w: 28, h: 56, lane: 1, moving: false, targetX: LANES[1] };
  enemies = [];
  roadLines = Array.from({ length: 10 }, (_, i) => ({ y: i * 80 }));
  score = 0;
  gameSpeed = 3;
  spawnTimer = 0;
  keys = {};
}

function startGame() {
  overlay.style.display = 'none';
  initGame();
  running = true;
  loop();
}

function gameOver() {
  running = false;
  cancelAnimationFrame(animId);
  if (score > best) best = score;
  bestDisplay.textContent = best;
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p>SCORE: ${score}</p>
    <button id="startBtn" onclick="startGame()">RETRY</button>`;
  overlay.style.display = 'flex';
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
  if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
});
document.addEventListener('keyup', e => keys[e.key] = false);

// Touch
let touchStartX = 0;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 10) {
    moveLane(e.changedTouches[0].clientX < canvas.getBoundingClientRect().left + W / 2 ? -1 : 1);
  } else {
    moveLane(dx < 0 ? -1 : 1);
  }
});

function moveLane(dir) {
  if (!running) return;
  const newLane = player.lane + dir;
  if (newLane >= 0 && newLane < 3) {
    player.lane = newLane;
    player.targetX = LANES[newLane];
  }
}

// Enemy colors
const ENEMY_COLORS = ['#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c'];
const ENEMY_TYPES = [
  { w: 32, h: 60, label: '🚗' },
  { w: 36, h: 70, label: '🚕' },
  { w: 30, h: 52, label: '🏎️' },
];

function spawnEnemy() {
  const lane = Math.floor(Math.random() * 3);
  const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
  const color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
  enemies.push({ x: LANES[lane], y: -80, w: type.w, h: type.h, color, label: type.label });
}

function drawRoad() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a0a1a');
  sky.addColorStop(1, '#1a0a00');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Road
  const road = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_RIGHT, 0);
  road.addColorStop(0, '#1a1a1a');
  road.addColorStop(0.5, '#222');
  road.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = road;
  ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);

  // Road edges glow
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(ROAD_LEFT, 0); ctx.lineTo(ROAD_LEFT, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_RIGHT, 0); ctx.lineTo(ROAD_RIGHT, H); ctx.stroke();
  ctx.shadowBlur = 0;

  // Lane dividers
  ctx.setLineDash([30, 20]);
  ctx.strokeStyle = '#ffaa0055';
  ctx.lineWidth = 2;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(ROAD_LEFT + LANE_W * i, 0);
    ctx.lineTo(ROAD_LEFT + LANE_W * i, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Moving road lines (center dashes)
  ctx.strokeStyle = '#ffaa00cc';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 6;
  roadLines.forEach(line => {
    ctx.beginPath();
    ctx.moveTo(ROAD_LEFT + ROAD_W / 2, line.y);
    ctx.lineTo(ROAD_LEFT + ROAD_W / 2, line.y + 35);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;
}

function drawCar(x, y, w, h, color, isPlayer) {
  const cx = x - w / 2, cy = y - h / 2;

  if (isPlayer) {
    // Player bike glow
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 20;
  } else {
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
  }

  // Car body
  ctx.fillStyle = isPlayer ? '#00ccff' : color;
  ctx.beginPath();
  ctx.roundRect(cx, cy + h * 0.1, w, h * 0.75, 6);
  ctx.fill();

  // Windshield
  ctx.fillStyle = isPlayer ? '#001a2ecc' : '#0008';
  ctx.beginPath();
  ctx.roundRect(cx + w * 0.1, cy + h * 0.15, w * 0.8, h * 0.25, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#111';
  [[cx - 4, cy + h * 0.15], [cx + w - 4, cy + h * 0.15],
   [cx - 4, cy + h * 0.65], [cx + w - 4, cy + h * 0.65]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.roundRect(wx, wy, 8, 14, 2); ctx.fill();
  });

  // Headlights / taillights
  ctx.fillStyle = isPlayer ? '#fff' : '#ff0';
  ctx.shadowColor = isPlayer ? '#fff' : '#ff0';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(cx + w * 0.25, isPlayer ? cy + h - 4 : cy + 4, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + w * 0.75, isPlayer ? cy + h - 4 : cy + 4, 4, 0, Math.PI * 2); ctx.fill();

  ctx.shadowBlur = 0;
}

function drawHUD() {
  scoreDisplay.textContent = score;
  speedDisplay.textContent = gameSpeed.toFixed(1) + 'x';
}

function checkCollision(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 - 4 &&
         Math.abs(a.y - b.y) < (a.h + b.h) / 2 - 4;
}

// Particles
let particles = [];
function addExplosion(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 1,
      color: ['#ff4400','#ffaa00','#fff'][Math.floor(Math.random()*3)]
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.04;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function loop() {
  if (!running) return;

  // Update road lines
  roadLines.forEach(line => { line.y += gameSpeed * 2; });
  roadLines.forEach(line => { if (line.y > H) line.y -= 10 * 80; });

  // Smooth player movement
  player.x += (player.targetX - player.x) * 0.18;

  // Spawn enemies
  spawnTimer++;
  const spawnRate = Math.max(30, 80 - score / 5);
  if (spawnTimer >= spawnRate) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // Update enemies
  enemies.forEach(e => { e.y += gameSpeed * 2; });
  enemies = enemies.filter(e => e.y < H + 100);

  // Collision
  for (const e of enemies) {
    if (checkCollision(player, e)) {
      addExplosion(player.x, player.y);
      // Draw one last frame with explosion
      drawRoad();
      enemies.forEach(en => drawCar(en.x, en.y, en.w, en.h, en.color, false));
      drawCar(player.x, player.y, player.w, player.h, '#00ccff', true);
      updateParticles();
      setTimeout(gameOver, 400);
      return;
    }
  }

  // Score + speed
  score++;
  gameSpeed = 3 + score / 150;

  // Draw
  drawRoad();
  enemies.forEach(e => drawCar(e.x, e.y, e.w, e.h, e.color, false));
  drawCar(player.x, player.y, player.w, player.h, '#00ccff', true);
  updateParticles();
  drawHUD();

  animId = requestAnimationFrame(loop);
}

// Init best
best = parseInt(localStorage.getItem('bikerace_best') || '0');
bestDisplay.textContent = best;
window.addEventListener('beforeunload', () => {
  localStorage.setItem('bikerace_best', best);
});
</script>
</body>
</html>
